<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- background -->
  <rect width="64" height="64" rx="14" fill="#1f1b16"/>
  <!-- terminal window dots -->
  <circle cx="13" cy="14" r="2.5" fill="#8b5e34" opacity="0.7"/>
  <circle cx="21" cy="14" r="2.5" fill="#8b5e34" opacity="0.45"/>
  <circle cx="29" cy="14" r="2.5" fill="#8b5e34" opacity="0.25"/>
  <!-- top rule -->
  <line x1="9" y1="21" x2="55" y2="21" stroke="#8b5e34" stroke-width="0.75" opacity="0.35"/>
  <!-- prompt symbol -->
  <text x="10" y="37"
    font-family="'Courier New', Courier, monospace"
    font-size="11" font-weight="700"
    fill="#8b5e34">&gt;_</text>
  <!-- blinking cursor block -->
  <rect x="31" y="27" width="7" height="11" rx="1" fill="#8b5e34" opacity="0.55"/>
  <!-- bottom watermark text -->
  <text x="10" y="53"
    font-family="'Courier New', Courier, monospace"
    font-size="5.5" font-weight="400"
    fill="#8b5e34" opacity="0.45">bugünün tarihi</text>
</svg>
