[build]
  command = "npx puppeteer browsers install chrome && npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  PUPPETEER_CACHE_DIR = "/opt/buildhome/.cache/puppeteer"

# SPA fallback — prerender olmayan rotalar için (örn. /quiz/:category)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
